name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libzbar0
      - name: Install Python dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run lint
        run: python -m ruff check app tests

  build:
    name: Build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
          - os: macos-13
            target: darwin-x86_64
          - os: macos-14
            target: darwin-arm64
          - os: windows-2022
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux system dependencies
        if: startsWith(matrix.target, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libzbar0
      - name: Install Python dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[build-bin]"
      - name: Build binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          fi
          python scripts/build_binary.py --version "$VERSION" --target "${{ matrix.target }}"
      - name: Smoke test binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            ./dist/efapiao-*/efapiao.exe --version
            ./dist/efapiao-*/efapiao.exe capabilities
          else
            ./dist/efapiao-*/efapiao --version
            ./dist/efapiao-*/efapiao capabilities
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: efapiao-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must match SemVer tag style, e.g. v0.1.0 or v0.1.0-rc.1" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: E-Fapiao-OCR ${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: release-assets/*
