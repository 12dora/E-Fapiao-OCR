name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libzbar0
      - name: Install Python dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run lint
        run: python -m ruff check app tests

  build:
    name: Build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
          - os: macos-14
            target: darwin-arm64
          - os: windows-2022
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux system dependencies
        if: startsWith(matrix.target, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libzbar0
      - name: Install Python dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[build-bin]"
      - name: Build lite binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          fi
          python scripts/build_binary.py --version "$VERSION" --target "${{ matrix.target }}" \
            --artifact-flavor lite
      - name: Install CnOCR dependencies
        run: python -m pip install -e ".[ocr-cnocr,build-bin]"
      - name: Build with-model binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          fi
          python scripts/build_binary.py --version "$VERSION" --target "${{ matrix.target }}" \
            --artifact-flavor with-model \
            --bundle-cnocr-model \
            --cnocr-model-profile invoice-lite
      - name: Smoke test binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            BIN="$(pwd)/$(find dist -path '*/efapiao.exe' -type f | sort | head -n 1)"
          else
            BIN="$(pwd)/$(find dist -path '*/efapiao' -type f | sort | head -n 1)"
          fi
          "$BIN" --version
          "$BIN" capabilities

          PORT=18080
          "$BIN" serve --host 127.0.0.1 --port "$PORT" > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true; cat server.log' EXIT

          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          base = "http://127.0.0.1:18080"
          for _ in range(60):
              try:
                  with urllib.request.urlopen(f"{base}/v1/health", timeout=1) as resp:
                      if json.load(resp) == {"status": "ok"}:
                          break
              except Exception:
                  time.sleep(0.5)
          else:
              raise SystemExit("server health check timed out")
          PY

          python - <<'PY'
          import json
          import urllib.error
          import urllib.request
          from uuid import uuid4

          def minimal_pdf(text):
              objects = [
                  b"<< /Type /Catalog /Pages 2 0 R >>",
                  b"<< /Type /Pages /Kids [3 0 R] /Count 1 >>",
                  b"<< /Type /Page /Parent 2 0 R /MediaBox [0 0 300 120] "
                  b"/Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>",
                  b"<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>",
              ]
              stream = f"BT /F1 12 Tf 30 80 Td ({text}) Tj ET".encode("ascii")
              objects.append(
                  f"<< /Length {len(stream)} >>\nstream\n".encode("ascii")
                  + stream
                  + b"\nendstream"
              )
              chunks = [b"%PDF-1.4\n"]
              offsets = [0]
              for i, obj in enumerate(objects, start=1):
                  offsets.append(sum(len(chunk) for chunk in chunks))
                  chunks.append(f"{i} 0 obj\n".encode("ascii") + obj + b"\nendobj\n")
              xref_offset = sum(len(chunk) for chunk in chunks)
              chunks.append(f"xref\n0 {len(objects) + 1}\n".encode("ascii"))
              chunks.append(b"0000000000 65535 f \n")
              for offset in offsets[1:]:
                  chunks.append(f"{offset:010d} 00000 n \n".encode("ascii"))
              chunks.append(
                  f"trailer << /Size {len(objects) + 1} /Root 1 0 R >>\n"
                  f"startxref\n{xref_offset}\n%%EOF\n".encode("ascii")
              )
              return b"".join(chunks)

          boundary = "----efapiao" + uuid4().hex
          pdf = minimal_pdf("synthetic smoke")
          body = (
              f"--{boundary}\r\n"
              'Content-Disposition: form-data; name="file"; filename="smoke.pdf"\r\n'
              "Content-Type: application/pdf\r\n\r\n"
          ).encode() + pdf + f"\r\n--{boundary}--\r\n".encode()
          req = urllib.request.Request(
              "http://127.0.0.1:18080/v1/invoices/parse",
              data=body,
              headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
              method="POST",
          )
          try:
              urllib.request.urlopen(req, timeout=5)
          except urllib.error.HTTPError as e:
              payload = json.loads(e.read().decode("utf-8"))
              assert e.code in {415, 422}, payload
              assert payload["detail"]["code"] in {"parse_failed", "rule_unhandled"}, payload
          else:
              raise SystemExit("synthetic smoke PDF unexpectedly parsed successfully")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: efapiao-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must match SemVer tag style, e.g. v0.1.0 or v0.1.0-rc.1" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: E-Fapiao-OCR ${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: release-assets/*
